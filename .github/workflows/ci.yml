name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: demenz
          POSTGRES_PASSWORD: demenz
          POSTGRES_DB: demenz_schulungen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U demenz -d demenz_schulungen"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://demenz:demenz@localhost:5432/demenz_schulungen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run db:migrate

      - run: npm run db:seed

      - run: npm run validate:content

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
